<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Remote Mouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <div>
          <p class="eyebrow">Remote Mouse</p>
          <h1>手机即触控板</h1>
          <p class="lead">同一局域网内扫码打开，滑动控制鼠标，点击执行操作，文本直接发送到电脑。</p>
        </div>
        <div class="connection">
          <div>
            <span class="label">连接状态</span>
            <strong id="statusText">连接中...</strong>
          </div>
          <button id="reconnectButton" class="ghost">重连</button>
        </div>
      </section>

      <section class="qr-section card">
        <div>
          <span class="label">局域网入口</span>
          <p id="baseUrl" class="base-url">正在生成链接...</p>
        </div>
        <img id="qrImage" class="qr-image" alt="Remote Mouse QR code" />
      </section>

      <section class="card pair-card">
        <div class="pad-head">
          <div>
            <span class="label">安全配对</span>
            <p>先输入电脑端显示的 6 位房间码，等待本机确认后才能控制。</p>
          </div>
        </div>
        <div class="pair-form">
          <input id="deviceName" type="text" maxlength="24" placeholder="设备名称，例如 iPhone 16" />
          <input id="pairCodeInput" type="text" inputmode="numeric" maxlength="6" placeholder="输入 6 位房间码" />
          <button id="pairButton">发起配对</button>
        </div>
        <p id="pairState" class="pair-state">未配对</p>
      </section>

      <section class="pad card control-panel locked" data-control-panel>
        <div class="pad-head">
          <div>
            <span class="label">触控区</span>
            <p>单指移动，双击快速确认，双指上下滑动滚轮。</p>
          </div>
          <div class="sensitivity-wrap">
            <label for="sensitivity">灵敏度</label>
            <input id="sensitivity" type="range" min="0.5" max="2.5" step="0.1" value="1.3" />
          </div>
        </div>
        <div id="touchpad" class="touchpad">
          <div class="touchpad-grid"></div>
          <span>Touch / Drag</span>
        </div>
        <div class="actions">
          <button data-click="left">左键</button>
          <button data-click="right">右键</button>
          <button data-click="left" data-double="true">双击</button>
        </div>
      </section>

      <section class="keyboard card control-panel locked" data-control-panel>
        <div class="pad-head">
          <div>
            <span class="label">键盘输入</span>
            <p>输入后发送到电脑当前焦点窗口。</p>
          </div>
        </div>
        <textarea id="textInput" rows="4" placeholder="输入文字，然后发送到电脑..."></textarea>
        <div class="actions compact">
          <button id="sendText">发送文本</button>
          <button data-key="backspace" class="ghost">退格</button>
          <button data-key="enter" class="ghost">回车</button>
          <button data-key="tab" class="ghost">Tab</button>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
